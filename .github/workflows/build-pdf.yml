name: Build CV (YAML → LaTeX → PDF) and commit

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**/*.yml'
      - 'data/**/*.yaml'
      - 'templates/**'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Pandoc and dependencies
        run: |
          sudo apt-get update
          # Added fontconfig to prevent missing font library errors on Ubuntu
          sudo apt-get install -y pandoc curl fontconfig

      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # The correct parameter name is tectonic-version, not version
          tectonic-version: '0.15.0'

      - name: Cache Tectonic
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: tectonic-${{ runner.os }}-v3

      - name: Build TEX and PDF
        run: |
          mkdir -p build
          
          # 1. Generate the .tex file using Pandoc
          pandoc --template ./templates/cv.latex \
                 --metadata-file data/cv.yaml \
                 -t latex -o build/cv.tex
          
          # 2. Compile the .tex into a .pdf using Tectonic directly
          # This avoids the "invalid pointer" crash caused by Pandoc's sub-process wrapper
          tectonic build/cv.tex

      - name: Copy to repo root
        run: cp build/cv.pdf cv.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update cv.pdf from YAML [skip ci]"
          file_pattern: "cv.pdf"
          branch: ${{ github.ref_name }}
          push_options: '--force-with-lease'
